<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex" />
        <title>Train Vision</title>
        <link rel="stylesheet" href="../general.css">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <div id="loading">
            <img src="../img/ShintoRailway.png" alt="" id="shintorailway" class="">
            <img src="../img/loadinginfo.png" alt="" id="loadinginfo">
        </div>
        <img src="../img/background.png" alt="" id="background">
        <img src="../img/CarNo/1.png" data-base="../img/CarNo/" alt="" id="carno">
        <p id="clock"></p>
        <div class="lineborder">
            <img src="../img/Linecolor_SK.png" id="border"> <!-- 路線色ボーダー -->
        </div>
        <div class="headers">
            <div class="header jp displayed">
                <div class="leftside">
                    <img src="../img/JP/TrainType_Local.png" data-base="../img/JP/TrainType_" alt="" class="traintype">
                    <img src="../img/JP/Destination_010.png" data-base="../img/JP/Destination_" alt="" class="destination"> <!-- 行先 -->
                    <img src="../img/JP/Homen.png" data-base="" alt="" class="yuki"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="../img/JP/LineName_Kawashima.png" data-base="../img/JP/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="../img/JP/next.png" data-base="../img/JP/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="../img/Numbering/SK_1.png" data-base="../img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="../img/JP/HeaderStaName/1.png" data-base="../img/JP/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="../img/JP/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
            <div class="header kana">
                <div class="leftside">
                    <img src="../img/JP/TrainType_Local.png" data-base="../img/JP/TrainType_" alt="" class="traintype">
                    <img src="../img/JP/Destination_010.png" data-base="../img/JP/Destination_" alt="" class="destination"> <!-- 行先 -->
                    <img src="../img/JP/Homen.png" data-base="" alt="" class="yuki"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="../img/JP/LineName_Kawashima.png" data-base="../img/JP/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="../img/Kana/next.png" data-base="../img/Kana/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="../img/Numbering/SK_1.png" data-base="../img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="../img/Kana/HeaderStaName/1.png" data-base="../img/Kana/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="../img/JP/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
            <div class="header en">
                <div class="leftside">
                    <img src="../img/EN/TrainType_Local.png" data-base="../img/EN/TrainType_" alt="" class="traintype">
                    <img src="../img/EN/Destination_010.png" data-base="../img/EN/Destination_" alt="" class="destination"> <!-- 行先 -->
                    <img src="../img/EN/for.png" data-base="" alt="" class="for"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="../img/EN/LineName_Kawashima.png" data-base="../img/EN/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="../img/EN/next.png" data-base="../img/EN/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="../img/Numbering/SK_1.png" data-base="../img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="../img/EN/HeaderStaName/1.png" data-base="../img/EN/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="../img/EN/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
        </div>
        <div class="contents">
            <div class="content displayed">
                <img src="../img/StationsBar_Default.png" data-base="../img/StationsBar_" alt="" class="linebar"> <!-- 各駅案内のバー -->
                <img src="../img/DestinationArrow_Default.png" data-base="../img/DestinationArrow_" alt="" class="destinationarrow"> <!-- 行き先矢印 -->
                <img src="../img/JP/StaName_Vertical/1.png" data-base="../img/JP/StaName_Vertical/" alt="" class="stationsname staname1">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint1">
                <img src="../img/JP/StaName_Vertical/2.png" data-base="../img/JP/StaName_Vertical/" alt="" class="stationsname staname2">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint2">

            <div class="content">
                <img src="../img/StationsBar_Kawashima.png" data-base="../img/StationsBar_" alt="" class="linebar"> <!-- 各駅案内のバー -->
                <img src="../img/DestinationArrow_Sakuradai.png" data-base="../img/DestinationArrow_" alt="" class="destinationarrow"> <!-- 行き先矢印 -->
                <img src="../img/EN/StaName_Vertical/1.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname1">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint1">
                <img src="../img/EN/StaName_Vertical/2.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname2">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint2">
                <img src="../img/EN/StaName_Vertical/3.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname3">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint3">
                <img src="../img/EN/StaName_Vertical/4.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname4">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint4">
                <img src="../img/EN/StaName_Vertical/5.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname5">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint5">
                <img src="../img/EN/StaName_Vertical/6.png" data-base="../img/EN/StaName_Vertical/" alt="" class="stationsname staname6">
                <img src="../img/StationPoint.png" alt="" class="stationspoint stapoint6">
            </div>
            <div class="content">
                <img src="../img/JP/StationsFull_SK.png" alt="" class="stationsfull">
                <img src="../img/StaArrow_Default.png" alt="" class="staarrow">
                <img src="../img/DestinationArrow_Default.png" data-base="../img/DestinationArrow_" alt="" class="destinationarrow">
            </div>
            <div class="content">
                <img src="../img/EN/StationsFull_SK.png" alt="" class="stationsfull">
                <img src="../img/StaArrow_Default.png" alt="" class="staarrow">
                <img src="../img/DestinationArrow_Default.png" data-base="../img/DestinationArrow_" alt="" class="destinationarrow">
            </div>
        </div>
        <script src="../general.js"></script>
        <script src="./script.js"></script>
