<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex" />
        <title>トレインビジョン操作パネル</title>
        <link rel="stylesheet" href="./panel.css">
    </head>
    <body>
        <h1>トレインビジョン操作パネル</h1>
        <p class="line">路　線：
            <select id="selectline">
                <option value="0">桜台線（内回り）</option>
                <option value="1">桜台線（外回り）</option>
                <option value="2">河島線（北　行）</option>
                <option value="3">河島線（南　行）</option>
                <option value="4">築石線（上　り）</option>
                <option value="5">築石線（下　り）</option>
                <option value="6">中央線（上　り）</option>
                <option value="7">中央線（下　り）</option>
                <option value="8">街道線（北　行）</option>
                <option value="9">街道線（南　行）</option>
            </select>
        </p>
        <p class="sta">次　駅：
            <select id="selectsta">
                <option value="1">００００１　新　祥</option>
                <option value="2">００００２　神　崎</option>
                <option value="3">００００３　京　橋</option>
                <option value="4">００００４　柳　島</option>
                <option value="5">００００５　弁天橋</option>
                <option value="6">００００６　板屋橋</option>
                <option value="7">００００７　藤　崎</option>
                <option value="8">００００８　石坂町</option>
                <option value="9">００００９　深　田</option>
                <option value="10">０００１０　岩　橋</option>
                <option value="11">０００１１　日向町</option>
                <option value="12">０００１２　桜　台</option>
                <option value="13">０００１３　愛　市</option>
                <option value="14">０００１４　鶴　里</option>
                <option value="15">０００１５　村松町</option>
                <option value="16">０００１６　菊野坂</option>
                <option value="17">０００１７　築　石</option>
                <option value="18">０００１８　西築石</option>
                <option value="19">０００１９　代官町</option>
                <option value="20">０００２０　西　塚</option>
                <option value="21">０００２１　本　郷</option>
                <option value="22">０００２２　常磐台</option>
                <option value="23">０００２３　高野台</option>
                <option value="24">０００２４　春日町</option>
                <option value="25">０００２５　上落合</option>
                <option value="26">０００２６　茅　橋</option>
                <option value="27">０００２７　伏　見</option>
            </select>
        </p>
        <p class="car">号　車：
            <select id="selectcar">
                <option value="1">０１号車</option>
                <option value="2">０２号車</option>
                <option value="3">０３号車</option>
                <option value="4">０４号車</option>
                <option value="5">０５号車</option>
                <option value="6">０６号車</option>
                <option value="7">０７号車</option>
                <option value="8">０８号車</option>
                <option value="9">０９号車</option>
                <option value="10">１０号車</option>
                <option value="11">１１号車</option>
                <option value="12">１２号車</option>
                <option value="13">１３号車</option>
                <option value="14">１４号車</option>
                <option value="15">１５号車</option>
                <option value="16">１６号車</option>
            </select>
        </p>
        <a id="update">更　新</a>
        <a id="departure">発　車</a>
        <p id="error"></p>
        <script>
            let digit = 0;
            document.getElementById('update').addEventListener('click', returnWindow);
            document.getElementById('departure').addEventListener('click', () => {
                digit = 1;
                returnWindow();
            });

            console.log(document.getElementById('selectsta').value);

            function returnWindow() {
                if (!window.opener || window.opener.closed) {
                    document.getElementById('error').innerHTML = 'ビジョン画面が開かれていません。次のサイトにアクセスしてください：https://daizubuilding.github.io/Shinsho/shintorailway/trainvision/';
                    return false;
                }
                document.getElementById('selectsta').value = Number(document.getElementById('selectsta').value) + digit;
                window.opener.changeData(Number(document.getElementById('selectsta').value), document.getElementById('selectline').value, document.getElementById('selectcar').value);
            }
        </script>
    </body>
</html>
