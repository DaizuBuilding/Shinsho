        <title>Train Vision</title>
        <link rel="stylesheet" href="./vision.css">
    </head>
    <body>
        <img src="./img/background.png" alt="" id="background">
        <div id="jp" class="division displayed">
            <div class="header">
                <div class="leftside">
                    <img src="./img/JP/TrainType_Outbound.png" alt="" id="traintype"> <!-- 列車種別 -->

                    <img src="./img/Numbering/SS06.png" alt="" id="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="./img/JP/HeaderStaName/6.png" alt="" id="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="./img/JP/CarNo.png" alt="" id="carno_text"> <!-- 号車テキスト -->
                </div>
                <div class="lineborder">
                    <img src="./img/Linecolor_Sakuradai.png" alt="" id="lineborder"> <!-- 路線色ボーダー -->
                </div>
            </div>
            <div class="contents"></div>
        </div>
