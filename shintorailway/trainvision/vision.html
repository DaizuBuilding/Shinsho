<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex" />
        <title>Train Vision</title>
        <link rel="stylesheet" href="./vision.css">
    </head>
    <body>
        <img src="./img/ShintoRailway.png" alt="" id="shintorailway" class="">
        <img src="./img/background.png" alt="" id="background">
        <div class="lineborder">
            <img src="./img/Linecolor_Sakuradai.png" alt="" class="lineborder"> <!-- 路線色ボーダー -->
        </div>
        <div id="jp" class="division displayed">
            <div class="header">
                <div class="leftside">
                    <img src="./img/JP/TrainType_Outbound.png" data-base="" alt="" class="traintype"> <!-- 列車種別 -->
                    <img src="./img/JP/Destination_913.png" data-base="" alt="" class="destination"> <!-- 行先 -->
                    <img src="./img/JP/Homen.png" data-base="" alt="" class="yuki"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="./img/JP/LineName_Sakuradai_Outbound.png" data-base="./img/JP/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="./img/JP/next.png" data-base="./img/JP/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="./img/Numbering/SS06.png" data-base="./img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="./img/JP/HeaderStaName/6.png" data-base="./img/JP/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="./img/JP/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
            <div class="contents"></div>
        </div>
        <div id="kana" class="division">
            <div class="header">
                <div class="leftside">
                    <img src="./img/JP/TrainType_Outbound.png" data-base="" alt="" class="traintype"> <!-- 列車種別 -->
                    <img src="./img/JP/Destination_913.png" data-base="" alt="" class="destination"> <!-- 行先 -->
                    <img src="./img/JP/Homen.png" data-base="" alt="" class="yuki"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="./img/JP/LineName_Sakuradai_Outbound.png" data-base="./img/JP/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="./img/Kana/next.png" data-base="./img/Kana/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="./img/Numbering/SS06.png" data-base="./img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="./img/Kana/HeaderStaName/6.png" data-base="./img/Kana/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="./img/JP/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
            <div class="contents"></div>
        </div>
        <div id="en" class="division">
            <div class="header">
                <div class="leftside">
                    <img src="./img/EN/TrainType_Outbound.png" data-base="./img/EN/TrainType_" alt="" class="traintype"> <!-- 列車種別 -->
                    <img src="./img/EN/Destination_913.png" data-base="" alt="" class="destination"> <!-- 行先 -->
                    <img src="./img/EN/for.png" data-base="" alt="" class="for"> <!-- 行き, 方面 -->
                </div>
                <div class="headermain">
                    <img src="./img/EN/LineName_Sakuradai_Outbound.png" data-base="./img/EN/LineName_" alt="" class="line"> <!-- ヘッダー路線 -->
                    <img src="./img/EN/next.png" data-base="./img/EN/" alt="" class="next"> <!-- 次は, まもなく -->
                    <img src="./img/Numbering/SS06.png" data-base="./img/Numbering/" alt="" class="headernumbering"> <!-- ヘッダーナンバリング -->
                    <img src="./img/EN/HeaderStaName/6.png" data-base="./img/EN/HeaderStaName/" alt="" class="headerstaname"> <!-- ヘッダー駅名 -->
                    <img src="./img/EN/CarNo.png" data-base="" alt="" class="carno_text"> <!-- 号車テキスト -->
                </div>
            </div>
            <div class="contents"></div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
